<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>React Learning Roadmap</title>
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4f0;
    --color-background-success: #e1f5ee;
    --color-background-info: #e6f1fb;
    --color-background-warning: #faeeda;
    --color-text-primary: #2c2c2a;
    --color-text-secondary: #5f5e5a;
    --color-text-tertiary: #888780;
    --color-text-success: #0f6e56;
    --color-text-info: #0c447c;
    --color-text-warning: #633806;
    --color-border-tertiary: rgba(44,44,42,0.15);
    --color-border-secondary: rgba(44,44,42,0.3);
    --color-border-primary: rgba(44,44,42,0.4);
    --color-border-info: #185fa5;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-mono: 'Fira Code', 'Cascadia Code', monospace;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-background-primary: #1e1e1c;
      --color-background-secondary: #2a2a28;
      --color-background-success: #04342c;
      --color-background-info: #042c53;
      --color-background-warning: #412402;
      --color-text-primary: #e8e6de;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-success: #5dcaa5;
      --color-text-info: #85b7eb;
      --color-text-warning: #fac775;
      --color-border-tertiary: rgba(232,230,222,0.15);
      --color-border-secondary: rgba(232,230,222,0.3);
      --color-border-primary: rgba(232,230,222,0.4);
      --color-border-info: #378add;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 780px; margin: 0 auto; }
  .header { padding: 0 0 16px; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 20px; }
  .header h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--color-text-secondary); }
  .progress-bar { height: 4px; background: var(--color-border-tertiary); border-radius: 2px; margin: 12px 0 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 2px; transition: width 0.4s ease; }
  .progress-label { font-size: 12px; color: var(--color-text-tertiary); }
  .stage-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
  .tab { font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .tab.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
  .stage-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .stage-title { font-size: 16px; font-weight: 500; }
  .stage-meta { font-size: 12px; color: var(--color-text-tertiary); margin-top: 3px; }
  .stage-badge { font-size: 11px; padding: 4px 10px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  .s1-badge { background: #E1F5EE; color: #0F6E56; } .s2-badge { background: #EEEDFE; color: #3C3489; } .s3-badge { background: #E6F1FB; color: #0C447C; } .s4-badge { background: #FAEEDA; color: #633806; } .s5-badge { background: #FAECE7; color: #712B13; }
  .concepts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  @media (max-width: 500px) { .concepts-grid { grid-template-columns: 1fr; } }
  .concept-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px 14px; cursor: pointer; transition: border-color 0.12s; }
  .concept-card:hover { border-color: var(--color-border-secondary); }
  .concept-card.done { border-color: #1D9E75; background: var(--color-background-success); }
  .concept-card.done .cc-title { color: var(--color-text-success); }
  .concept-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .cc-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
  .cc-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; transition: all 0.15s; }
  .concept-card.done .cc-check { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .cc-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
  .cc-tags { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; }
  .cc-tag { font-size: 10px; padding: 2px 6px; border-radius: 99px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-tertiary); }
  .detail-box { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 16px 18px; margin-bottom: 18px; display: none; border: 0.5px solid var(--color-border-tertiary); }
  .detail-box.show { display: block; }
  .detail-box h3 { font-size: 14px; font-weight: 500; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .close-x { background: none; border: none; color: var(--color-text-tertiary); cursor: pointer; font-size: 13px; padding: 0; }
  .close-x:hover { color: var(--color-text-primary); }
  .detail-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 500px) { .detail-sections { grid-template-columns: 1fr; } }
  .ds { background: var(--color-background-primary); border-radius: var(--border-radius-md); padding: 11px 13px; border: 0.5px solid var(--color-border-tertiary); }
  .ds-label { font-size: 10px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .ds-content { font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; }
  .ds-content code { font-family: var(--font-mono); font-size: 11px; background: var(--color-background-secondary); padding: 1px 4px; border-radius: 3px; color: var(--color-text-primary); }
  .ask-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .ask-btn { font-size: 12px; padding: 6px 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; transition: background 0.12s; }
  .ask-btn:hover { background: var(--color-background-primary); }
  .resources-row { margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--color-border-tertiary); }
  .resources-row h4 { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; }
  .resource-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .rl { font-size: 12px; color: var(--color-text-info); text-decoration: none; padding: 3px 0; border-bottom: 0.5px solid var(--color-border-info); }
  .rl:hover { opacity: 0.75; }
  .nav-row { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 0.5px solid var(--color-border-tertiary); }
  .nav-btn { font-size: 13px; padding: 7px 16px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; }
  .nav-btn:hover { background: var(--color-background-secondary); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>React learning roadmap</h1>
    <p>5 stages · 30 concepts · click any concept to study it · progress is saved locally</p>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">0 of 30 concepts completed</div>
  </div>
  <div class="stage-tabs" id="tabs"></div>
  <div id="stage-view"></div>
</div>

<script>
const stages = [
  {
    id:0, title:"Stage 1 — Component thinking", badge:"Week 1", badgeClass:"s1-badge",
    meta:"How React actually works before you write a single hook",
    concepts:[
      {id:"c0",title:"JSX & the virtual DOM",desc:"How JSX compiles to JS and why React uses a virtual DOM",tags:["Core","Mental model"],
       why:"Every bug you'll ever hit in React traces back to not understanding this.",
       what:"JSX is syntactic sugar for React.createElement(). React builds a lightweight JS object tree (vDOM), diffs it against the previous one, and only updates the real DOM where needed.",
       code:"const el = &lt;h1&gt;Hi&lt;/h1&gt;\n// compiles to:\nReact.createElement('h1', null, 'Hi')",
       pitfall:"JSX is not HTML. className not class, htmlFor not for. Self-close all tags.",
       practice:"Write 3 components without JSX using createElement() — then rewrite them with JSX.",
       resources:[{l:"React docs: Writing markup with JSX",u:"https://react.dev/learn/writing-markup-with-jsx"}]},
      {id:"c1",title:"Props & component composition",desc:"Passing data down, children prop, prop types",tags:["Core","Data flow"],
       why:"Props are the foundation of every React app. Composition > inheritance.",
       what:"Props flow one-way: parent → child. The children prop lets you nest components. Never mutate props — treat them as read-only snapshots.",
       code:"function Card({ title, children }) {\n  return &lt;div&gt;&lt;h2&gt;{title}&lt;/h2&gt;{children}&lt;/div&gt;\n}",
       pitfall:"Prop drilling (passing props 4+ levels deep). Solve with Context or state lifting.",
       practice:"Build a reusable Card with title, subtitle, footer props and a children slot.",
       resources:[{l:"React docs: Passing props to a component",u:"https://react.dev/learn/passing-props-to-a-component"}]},
      {id:"c2",title:"State with useState",desc:"Local component state, re-renders, batching",tags:["Core","Hooks"],
       why:"The most-used hook. You'll write this 50 times a day.",
       what:"useState returns [value, setter]. Calling the setter schedules a re-render. React 18+ batches multiple setState calls automatically — even inside setTimeout.",
       code:"const [count, setCount] = useState(0)\n// Never mutate directly:\n// count++ ← WRONG\nsetCount(prev => prev + 1) // ← RIGHT",
       pitfall:"State updates are async. Never rely on state immediately after setting it.",
       practice:"Build a counter, a toggle, and a form field — all with useState.",
       resources:[{l:"React docs: useState",u:"https://react.dev/reference/react/useState"}]},
      {id:"c3",title:"Conditional rendering",desc:"&&, ternary, early returns, null rendering",tags:["Core","Patterns"],
       why:"You'll use this in literally every component.",
       what:"JSX is just JS — use ternaries, &&, or early returns. Return null to render nothing. Avoid if/else inside JSX returns.",
       code:"{isLoggedIn ? &lt;Dashboard /&gt; : &lt;Login /&gt;}\n// Guard:\n{error &amp;&amp; &lt;ErrorBanner msg={error} /&gt;}",
       pitfall:"0 && renders 0 on screen. Use !!count or a ternary instead.",
       practice:"Build a component that shows a loading spinner, error state, or data.",
       resources:[{l:"React docs: Conditional rendering",u:"https://react.dev/learn/conditional-rendering"}]},
      {id:"c4",title:"Lists & keys",desc:"Rendering arrays, the key prop, reconciliation",tags:["Core","Performance"],
       why:"Keys are how React knows which list item changed. Wrong keys = subtle bugs.",
       what:"Map arrays to JSX. Always add a stable, unique key prop. Never use array index as key when list items can reorder.",
       code:"const items = data.map(item => (\n  &lt;li key={item.id}&gt;{item.name}&lt;/li&gt;\n))",
       pitfall:"Using index as key when items can be added/removed/reordered causes ghost state bugs.",
       practice:"Render a list of 5 todo items. Add delete functionality. Watch what breaks with index keys.",
       resources:[{l:"React docs: Rendering lists",u:"https://react.dev/learn/rendering-lists"}]},
      {id:"c5",title:"Event handling",desc:"onClick, onChange, synthetic events, preventing defaults",tags:["Core","Interaction"],
       why:"Every interactive UI element uses event handling.",
       what:"React wraps native DOM events in SyntheticEvents. Always pass a function reference — never call the function inline without a wrapper if it takes arguments.",
       code:"// RIGHT\n&lt;button onClick={() => handleDelete(id)}&gt;Delete&lt;/button&gt;\n// WRONG\n&lt;button onClick={handleDelete(id)}&gt;Delete&lt;/button&gt;",
       pitfall:"onClick={fn()} calls fn immediately on render, not on click.",
       practice:"Build a form that logs every keystroke and prevents default form submission.",
       resources:[{l:"React docs: Responding to events",u:"https://react.dev/learn/responding-to-events"}]},
    ]
  },
  {
    id:1, title:"Stage 2 — Hooks mastery", badge:"Week 2–3", badgeClass:"s2-badge",
    meta:"The engine room of every React app",
    concepts:[
      {id:"c6",title:"useEffect deeply",desc:"Side effects, dependency array, cleanup functions",tags:["Hooks","Critical"],
       why:"The most misused hook. Understanding it deeply separates juniors from seniors.",
       what:"useEffect runs after render. The dep array controls when. Return a cleanup function to cancel subscriptions. Every value used inside must be in deps.",
       code:"useEffect(() => {\n  const sub = subscribe(userId)\n  return () => sub.unsubscribe()\n}, [userId])",
       pitfall:"Empty [] with stale closures. Missing deps cause bugs; too many deps cause infinite loops.",
       practice:"Build a component that fetches user data when a userId prop changes, with cleanup.",
       resources:[{l:"React docs: useEffect",u:"https://react.dev/reference/react/useEffect"},{l:"You Might Not Need an Effect",u:"https://react.dev/learn/you-might-not-need-an-effect"}]},
      {id:"c7",title:"useRef",desc:"DOM refs, mutable values, avoiding re-renders",tags:["Hooks","DOM"],
       why:"Refs let you escape React's rendering system when needed.",
       what:"useRef gives you a mutable .current value that persists across renders without triggering re-renders. Use for: DOM access, storing previous values, timers.",
       code:"const inputRef = useRef(null)\ninputRef.current.focus()\n\nconst timer = useRef(null)\ntimer.current = setInterval(fn, 1000)",
       pitfall:"Don't read/write refs during render — only in effects or event handlers.",
       practice:"Build an autofocus input. Then build a stopwatch using useRef for the interval ID.",
       resources:[{l:"React docs: useRef",u:"https://react.dev/reference/react/useRef"}]},
      {id:"c8",title:"useContext",desc:"Global state without prop drilling, context providers",tags:["Hooks","State"],
       why:"The solution to prop drilling for things like auth, theme, language.",
       what:"Create a context, wrap the tree in a Provider, consume with useContext. Re-renders all consumers when context value changes.",
       code:"const AuthCtx = createContext(null)\nfunction App() {\n  return &lt;AuthCtx.Provider value={user}&gt;\n    &lt;Dashboard /&gt;\n  &lt;/AuthCtx.Provider&gt;\n}",
       pitfall:"Putting rapidly-changing values in context causes every consumer to re-render.",
       practice:"Build a theme switcher (dark/light) using Context that any nested component can access.",
       resources:[{l:"React docs: useContext",u:"https://react.dev/reference/react/useContext"}]},
      {id:"c9",title:"useReducer",desc:"Complex state logic, actions, dispatch pattern",tags:["Hooks","State"],
       why:"When useState gets messy with related state, useReducer gives you structure.",
       what:"useReducer is useState for complex state. You dispatch actions, a reducer returns the next state. Think Redux but local.",
       code:"function reducer(state, action) {\n  switch(action.type) {\n    case 'inc': return {count: state.count + 1}\n    default: return state\n  }\n}",
       pitfall:"Mutating state in the reducer. Always return a new object.",
       practice:"Refactor a multi-field form from multiple useStates into a single useReducer.",
       resources:[{l:"React docs: useReducer",u:"https://react.dev/reference/react/useReducer"}]},
      {id:"c10",title:"useMemo & useCallback",desc:"Memoization, preventing unnecessary recalculations",tags:["Hooks","Performance"],
       why:"Critical for performance in real apps with heavy calculations or frequent parent re-renders.",
       what:"useMemo caches a computed value. useCallback caches a function reference. Both recompute only when deps change. Don't overuse — add only when you've profiled a real issue.",
       code:"const sorted = useMemo(() => {\n  return [...data].sort((a,b) => a.price - b.price)\n}, [data])\n\nconst handleClick = useCallback(() => {\n  doSomething(id)\n}, [id])",
       pitfall:"Premature optimization. Memoization itself has cost — only use when needed.",
       practice:"Build a searchable list of 1000 items. Measure perf with/without useMemo in DevTools.",
       resources:[{l:"React docs: useMemo",u:"https://react.dev/reference/react/useMemo"}]},
      {id:"c11",title:"Custom hooks",desc:"Extracting reusable logic, naming conventions, composition",tags:["Hooks","Patterns","Critical"],
       why:"The single most important pattern in modern React.",
       what:"A custom hook is any function starting with 'use' that calls other hooks. Extract logic used in 2+ places — data fetching, form state, timers, local storage.",
       code:"function useFetch(url) {\n  const [data, setData] = useState(null)\n  const [loading, setLoading] = useState(true)\n  useEffect(() => {\n    fetch(url).then(r => r.json())\n      .then(d => { setData(d); setLoading(false) })\n  }, [url])\n  return { data, loading }\n}",
       pitfall:"Hooks must follow Rules of Hooks even inside custom hooks — no conditional calls.",
       practice:"Build: useLocalStorage, useFetch, useDebounce, useToggle.",
       resources:[{l:"React docs: Reusing logic with custom hooks",u:"https://react.dev/learn/reusing-logic-with-custom-hooks"}]},
    ]
  },
  {
    id:2, title:"Stage 3 — Architecture & patterns", badge:"Week 3–4", badgeClass:"s3-badge",
    meta:"How to structure real apps that don't collapse under their own weight",
    concepts:[
      {id:"c12",title:"Component composition patterns",desc:"Compound components, slots, render props",tags:["Patterns","Architecture"],
       why:"How every major UI library (shadcn/ui, Radix) is built.",
       what:"Compound components share implicit state between parent and children using Context. Think Select with Option children. Slots use children or named props for flexible layouts.",
       code:"&lt;Tabs defaultValue='a'&gt;\n  &lt;Tabs.List&gt;\n    &lt;Tabs.Trigger value='a'&gt;Tab A&lt;/Tabs.Trigger&gt;\n  &lt;/Tabs.List&gt;\n  &lt;Tabs.Content value='a'&gt;Content&lt;/Tabs.Content&gt;\n&lt;/Tabs&gt;",
       pitfall:"Don't overuse — simple components don't need this complexity.",
       practice:"Build a compound Accordion component with Accordion.Item and Accordion.Content children.",
       resources:[{l:"Patterns.dev: Compound pattern",u:"https://www.patterns.dev/react/compound-pattern"}]},
      {id:"c13",title:"State management strategy",desc:"Local vs lifted vs global state, Zustand, Context",tags:["Architecture","State"],
       why:"Wrong state placement is the #1 cause of React app complexity.",
       what:"Rule: keep state as local as possible, lift only when needed. Context for slow-changing globals. Zustand for dynamic shared state. Avoid Redux unless the team knows it.",
       code:"import { create } from 'zustand'\nconst useStore = create(set => ({\n  user: null,\n  setUser: (u) => set({ user: u })\n}))",
       pitfall:"Global state for everything. Most state should be local.",
       practice:"Build an app with: local form state, lifted cart state, global auth via Zustand.",
       resources:[{l:"Zustand docs",u:"https://docs.pmnd.rs/zustand/getting-started/introduction"}]},
      {id:"c14",title:"Data fetching patterns",desc:"TanStack Query, loading/error states, caching",tags:["Architecture","Data"],
       why:"Manually handling fetch in useEffect doesn't scale. TanStack Query is the industry standard.",
       what:"TanStack Query handles caching, background refetch, loading/error states, pagination, mutations.",
       code:"const { data, isLoading, error } = useQuery({\n  queryKey: ['user', userId],\n  queryFn: () => fetchUser(userId)\n})",
       pitfall:"Managing loading/error state manually in useState when TanStack Query handles it better.",
       practice:"Refactor a manual fetch useEffect to TanStack Query. Add a mutation for a POST.",
       resources:[{l:"TanStack Query docs",u:"https://tanstack.com/query/latest"}]},
      {id:"c15",title:"Forms with React Hook Form",desc:"Controlled vs uncontrolled, validation, Zod",tags:["Patterns","Forms"],
       why:"Forms are in every app. React Hook Form is the performance-correct way to build them.",
       what:"React Hook Form uses uncontrolled inputs by default — making forms much faster. Integrates with Zod for schema validation.",
       code:"const { register, handleSubmit } = useForm()\n\n&lt;form onSubmit={handleSubmit(onSubmit)}&gt;\n  &lt;input {...register('email', { required: true })} /&gt;\n&lt;/form&gt;",
       pitfall:"Mixing controlled (useState) and uncontrolled (register) inputs in the same form.",
       practice:"Build a multi-step form with validation using React Hook Form + Zod.",
       resources:[{l:"React Hook Form docs",u:"https://react-hook-form.com"},{l:"Zod docs",u:"https://zod.dev"}]},
      {id:"c16",title:"React Router v6",desc:"Routes, nested routes, useNavigate, useParams",tags:["Architecture","Routing"],
       why:"Client-side routing is in every SPA. Understand this before moving to Next.js.",
       what:"React Router v6 uses element-based routes. Nested routes with Outlet for layouts. useParams for URL params, useNavigate for programmatic navigation.",
       code:"&lt;Routes&gt;\n  &lt;Route path='/' element={&lt;Layout /&gt;}&gt;\n    &lt;Route index element={&lt;Home /&gt;} /&gt;\n    &lt;Route path='users/:id' element={&lt;User /&gt;} /&gt;\n  &lt;/Route&gt;\n&lt;/Routes&gt;",
       pitfall:"Using v5 patterns (component= prop, Switch) in v6.",
       practice:"Build an app with a persistent navbar layout and 3 nested routes including a dynamic :id route.",
       resources:[{l:"React Router v6 docs",u:"https://reactrouter.com/en/main"}]},
      {id:"c17",title:"Error boundaries & Suspense",desc:"Catching render errors, lazy loading, fallback UI",tags:["Architecture","Performance"],
       why:"Production apps crash. Error boundaries catch them gracefully.",
       what:"Error boundaries catch render errors. Suspense handles async rendering with a fallback. React.lazy() enables code splitting.",
       code:"const Dashboard = lazy(() => import('./Dashboard'))\n\n&lt;Suspense fallback={&lt;Spinner /&gt;}&gt;\n  &lt;Dashboard /&gt;\n&lt;/Suspense&gt;",
       pitfall:"Error boundaries don't catch errors in event handlers or async code — only in render.",
       practice:"Add React.lazy code-splitting to 3 routes. Add an error boundary to the whole app.",
       resources:[{l:"React docs: Error boundaries",u:"https://react.dev/reference/react/Component#catching-rendering-errors-with-an-error-boundary"}]},
    ]
  },
  {
    id:3, title:"Stage 4 — Performance", badge:"Week 4–5", badgeClass:"s4-badge",
    meta:"Make your app feel instant",
    concepts:[
      {id:"c18",title:"React.memo & re-render prevention",desc:"When components re-render, referential equality",tags:["Performance","Core"],
       why:"Understanding re-renders is what makes you dangerous as a React dev.",
       what:"A component re-renders when its parent re-renders OR its props/state change. React.memo skips re-render if props haven't changed (shallow comparison).",
       code:"const UserCard = React.memo(function UserCard({ user }) {\n  return &lt;div&gt;{user.name}&lt;/div&gt;\n})",
       pitfall:"React.memo uses shallow equality — objects/arrays always appear changed unless memoized.",
       practice:"Use React DevTools Profiler to find unnecessary re-renders. Fix them.",
       resources:[{l:"React docs: React.memo",u:"https://react.dev/reference/react/memo"}]},
      {id:"c19",title:"Code splitting & lazy loading",desc:"Bundle size, dynamic imports, React.lazy",tags:["Performance","Architecture"],
       why:"Smaller initial bundle = faster load. Critical for real-world apps.",
       what:"Split code by route or heavy component using React.lazy + dynamic import(). The browser only loads what it needs.",
       code:"const Analytics = lazy(() => import('./pages/Analytics'))\n\n&lt;Route path='/analytics' element={\n  &lt;Suspense fallback={&lt;PageLoader /&gt;}&gt;\n    &lt;Analytics /&gt;\n  &lt;/Suspense&gt;\n} /&gt;",
       pitfall:"Not splitting at all. A 2MB bundle on first load kills conversions.",
       practice:"Audit your bundle with vite-bundle-visualizer. Lazy-load your heaviest routes.",
       resources:[{l:"React docs: lazy",u:"https://react.dev/reference/react/lazy"}]},
      {id:"c20",title:"List virtualization",desc:"Rendering 1000s of rows, TanStack Virtual",tags:["Performance","Advanced"],

let currentStage = 0
let completed = new Set(JSON.parse(localStorage.getItem('react_roadmap_done')||'[]'))
let activeConceptId = null

function save() {
  try { localStorage.setItem('react_roadmap_done', JSON.stringify([...completed])) } catch(e){}
}
function totalDone() { return completed.size }
function totalConcepts() { return stages.reduce((s,st)=>s+st.concepts.length,0) }

function updateProgress() {
  const done = totalDone(), total = totalConcepts()
  document.getElementById('prog').style.width = (done/total*100)+'%'
  document.getElementById('prog-label').textContent = `${done} of ${total} concepts completed`
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = stages.map((s,i)=>{
    const done = s.concepts.filter(c=>completed.has(c.id)).length
    return `<button class="tab ${i===currentStage?'active':''}" onclick="goStage(${i})">${s.title.split('—')[0].trim()} (${done}/${s.concepts.length})</button>`
  }).join('')
}

function renderStage() {
  const s = stages[currentStage]
  const done = s.concepts.filter(c=>completed.has(c.id)).length
  document.getElementById('stage-view').innerHTML = `
    <div class="stage-header">
      <div>
        <div class="stage-title">${s.title}</div>
        <div class="stage-meta">${s.meta} · ${done}/${s.concepts.length} done</div>
      </div>
      <span class="stage-badge ${s.badgeClass}">${s.badge}</span>
    </div>
    <div id="detail-box" class="detail-box"></div>
    <div class="concepts-grid">${s.concepts.map(renderCard).join('')}</div>
    <div class="nav-row">
      <button class="nav-btn" onclick="goStage(${currentStage-1})" ${currentStage===0?'disabled':''}>← Previous stage</button>
      <button class="nav-btn" onclick="goStage(${currentStage+1})" ${currentStage===stages.length-1?'disabled':''}>Next stage →</button>
    </div>
  `
}

function renderCard(c) {
  const isDone = completed.has(c.id)
  return `<div class="concept-card ${isDone?'done':''}" id="card-${c.id}" onclick="openConcept('${c.id}')">
    <div class="concept-top">
      <div class="cc-title">${c.title}</div>
      <div class="cc-check">${isDone?'✓':''}</div>
    </div>
    <div class="cc-desc">${c.desc}</div>
    <div class="cc-tags">${c.tags.map(t=>`<span class="cc-tag">${t}</span>`).join('')}</div>
  </div>`
}

function openConcept(id) {
  const s = stages[currentStage]
  const concept = s.concepts.find(c=>c.id===id)
  const box = document.getElementById('detail-box')

  if (activeConceptId === id) {
    activeConceptId = null
    box.classList.remove('show')
    box.innerHTML = ''
    return
  }
  activeConceptId = id
  const res = (concept.resources||[]).map(r=>`<a class="rl" href="${r.u}" target="_blank">${r.l}</a>`).join('')
  box.innerHTML = `
    <h3>${concept.title} <button class="close-x" onclick="openConcept('${id}')">✕ close</button></h3>
    <div class="detail-sections">
      <div class="ds"><div class="ds-label">Why this matters</div><div class="ds-content">${concept.why}</div></div>
      <div class="ds"><div class="ds-label">The concept</div><div class="ds-content">${concept.what}</div></div>
      <div class="ds"><div class="ds-label">Code pattern</div><div class="ds-content"><code>${concept.code.replace(/\n/g,'<br>').replace(/ /g,'&nbsp;')}</code></div></div>
      <div class="ds"><div class="ds-label">Common pitfall</div><div class="ds-content">${concept.pitfall}</div></div>
      <div class="ds" style="grid-column:span 2"><div class="ds-label">Practice exercise</div><div class="ds-content">${concept.practice}</div></div>
    </div>
    ${res?`<div class="resources-row"><h4>Study resources</h4><div class="resource-links">${res}</div></div>`:''}
    <div class="ask-row">
      <button class="ask-btn" onclick="markDone('${id}')">Mark as done ✓</button>
    </div>
  `
  box.classList.add('show')
  setTimeout(()=>box.scrollIntoView({behavior:'smooth',block:'nearest'}),50)
}

function markDone(id) {
  completed.add(id)
  save()
  activeConceptId = null
  document.getElementById('detail-box').classList.remove('show')
  document.getElementById('detail-box').innerHTML = ''
  const card = document.getElementById('card-'+id)
  if(card) {
    card.classList.add('done')
    card.querySelector('.cc-title').style.color='var(--color-text-success)'
    card.querySelector('.cc-check').textContent='✓'
    card.querySelector('.cc-check').style.cssText='background:#1D9E75;border-color:#1D9E75;color:#fff;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px'
  }
  updateProgress()
  renderTabs()
}

function goStage(i) {
  if(i<0||i>=stages.length) return
  currentStage = i
  activeConceptId = null
  renderTabs()
  renderStage()
  updateProgress()
}

goStage(0)
updateProgress()
</script>
